wechat_article_links:
  # 把已知的 mp.weixin.qq.com 文章链接放到这里后运行：
  # python -m src.cli collect --source wechat
  # - title: 示例：公众号文章标题
  #   url: https://mp.weixin.qq.com/s/xxxxx
  #   source: 示例公众号
  #   category: 宏观

web_sources: []

manual_links: []

wechat_api:
  enabled: false
  provider: auto
  local_parser_enabled: true
  parse_endpoint: https://api.readgzh.site/rd
  readable_endpoint_template: https://api.readgzh.site/rd?url={url}
  list_endpoint_template: ""
  method: POST
  token_env: READGZH_API_KEY
  auth_header: Authorization
  auth_prefix: "Bearer "
  timeout_seconds: 12
  max_articles_per_account: 5

wechat_discovery:
  enabled: false
  providers: wxmp,sogou
  wxmp_cookies_file: config/wxmp_cookies.json
  lookback_days: 14
  max_results_per_account: 8
  query_templates: "{name} 研报,{name} 周报,{analysts} {keywords}"
  required_keywords: 研报,宏观,策略,金工,固收,周报,快评,点评,展望,利率,信用债,转债,行业轮动,资产配置

wewe_rss:
  enabled: true
  base_url: http://localhost:4000
  mode: fulltext
  limit_per_feed: 20
